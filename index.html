<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塔RPG Ver7.91 完全版</title>
<style>
body{font-family:sans-serif;text-align:center;background:#111;color:white;margin:0;padding:0;}
.game{max-width:480px;margin:auto;padding:10px;}
.bar{width:100%;height:20px;background:#333;border-radius:10px;margin:4px 0;}
.barInner{height:20px;border-radius:10px;transition:width 0.3s ease;}
.barInner.hp{background:red;}
.enemyBar{height:15px;background:lime;border-radius:10px;transition:width 0.3s ease;}
button{margin:3px;padding:10px;font-size:16px;border-radius:6px;}
.item{background:#222;padding:6px;margin:5px;border-radius:8px;}
.common{color:white}.rare{color:#66aaff}.epic{color:#cc66ff}.legend{color:gold}.mythic{color:red}
</style>
</head>
<body>
<div class="game">
<h1>🏯塔RPG Ver7.91 完全版</h1>

<h3 id="enemy"></h3>
<div class="bar"><div id="enemybar" class="enemyBar"></div></div>
<div id="enemyHP"></div>

<hr>

<div>階層 <span id="floor"></span></div>
<div class="bar"><div id="hpbar" class="barInner hp"></div></div>
<div>HP <span id="hp"></span></div>
<div>MP <span id="mp"></span></div>

<div>Lv <span id="level"></span></div>
<div>EXP <span id="exp"></span></div>
<div>💰 <span id="gold"></span></div>
<div>状態異常: <span id="playerStatusDisplay"></span></div>

<button id="attackBtn">⚔攻撃</button>
<button id="autoBtn">🔴オート戦闘OFF</button>
<br>
<label>オート優先スキル：
  <select id="prioritySkillSelect">
    <option value="0">🔥ファイア</option>
    <option value="1">💧アイス</option>
    <option value="2">⚡サンダー</option>
    <option value="3">💖ヒール</option>
    <option value="4">🛡バリア</option>
  </select>
</label>

<div id="skillButtons"></div>

<hr>
<h3>🎒装備</h3>
<button onclick="sortAttack()">ATK順</button>
<button onclick="sortRarity()">レア順</button>
<div id="inventory"></div>

<hr>
<h3>🏪ショップ</h3>
<button onclick="buyPotion()">HP回復ポーション 20G</button>
<button onclick="useStatusPotion()">💊状態異常回復 50G</button>
<button onclick="gacha()">装備ガチャ 100G</button>

<hr>
<button onclick="saveGame()">💾セーブ</button>
<div id="log"></div>
</div>

<script>
// 初期値
let floor=1, level=1, exp=0, expMax=10;
let playerMax=100, playerHP=100, attackPower=5, defense=2, gold=0;
let playerMaxMP=50, playerMP=50;
let enemyHP=20, enemyMax=20, enemy="スライム";
let inventory=[], equipment={weapon:null,armor:null,ring:null};
let rarityList=["common","rare","epic","legend","mythic"], rarityOrder={common:1,rare:2,epic:3,legend:4,mythic:5};
let logBox=document.getElementById("log");
let logHistory=[];
let autoBattleOn=false;
let nextFloorPending=false;
let prioritySkillIndex = 2;

// 状態異常管理
let playerStatus = [];
let enemyStatus = [];

// ログ
function log(text){
  logHistory.unshift(text);
  if(logHistory.length>5) logHistory.pop();
  logBox.innerHTML=logHistory.join("<br>");
}

// 敵生成
function spawnEnemy(){
  enemyMax=20+floor*5;
  enemyHP=enemyMax;
  enemyStatus = [];
  let enemies=["スライム","ゴブリン","オオカミ","骸骨"];
  enemy=enemies[Math.floor(Math.random()*enemies.length)];
  if(floor%10==0){enemy="🐉ボス";enemyMax=200+floor*10;enemyHP=enemyMax;}
  document.getElementById("enemy").innerText=enemy;
}

// プレイヤー攻撃
function attack(){
  if(enemyHP<=0) return;
  if(playerStatus.some(s=>s.type==="freeze")){log("❄氷結で動けない！"); return;}
  if(playerStatus.some(s=>s.type==="paralysis") && Math.random()<0.5){log("⚡麻痺で攻撃できない！"); return;}

  let damage = attackPower;
  if(Math.random()<0.15){damage*=2; log("⚡クリティカル!");}

  enemyHP -= damage; if(enemyHP<0) enemyHP=0;
  log("⚔ "+damage+" ダメージ!");
  playerMP += 5; if(playerMP>playerMaxMP) playerMP=playerMaxMP;
  log("💧 5 MP回復!");

  // 状態異常付与
  if(Math.random()<0.1) enemyStatus.push({type:"burn",value:5,turns:3,icon:"🔥"});
  if(Math.random()<0.05) enemyStatus.push({type:"paralysis",turns:2,icon:"⚡"});

  if(enemyHP==0 && !nextFloorPending){gold+=10+floor;exp+=5;dropItem();nextFloorPending=true;}

  enemyAttack();
  levelUp();
  update();
}

// レベルアップ
function levelUp(){
  if(exp>=expMax){
    exp=0; level++; attackPower+=2; playerMax+=10; playerHP=playerMax;
    playerMaxMP+=5; playerMP=playerMaxMP; expMax+=5;
  }
}

// 装備生成
function dropItem(){
  if(Math.random()>0.6)return;
  let types=["weapon","armor","ring"];
  let names=["剣","斧","弓","杖","鎧","指輪"];
  let itemName=names[Math.floor(Math.random()*names.length)];
  let item={name:itemName,type:types[Math.floor(Math.random()*3)],attack:Math.floor(Math.random()*10)+5,def:Math.floor(Math.random()*5),level:1,maxLevel:5,rarity:randomRarity()};
  inventory.push(item); drawInventory();
}

// ランダムレア
function randomRarity(){let r=Math.random();if(r<0.6)return"common";if(r<0.85)return"rare";if(r<0.95)return"epic";if(r<0.99)return"legend";return"mythic";}

// インベントリ表示
function drawInventory(){
  let html="";
  inventory.forEach((item,i)=>{
    html+=`<div class="item ${item.rarity}">${item.name} Lv${item.level}/${item.maxLevel} ATK ${item.attack} DEF ${item.def}<br>
    <button onclick="equipItem(${i})">装備</button>
    <button onclick="upgradeItem(${i})">強化</button>
    <button onclick="sellItem(${i})">売却</button>
    <button onclick="fuseItem(${i})">合成</button>
    <button onclick="rarityFuse(${i})">レア合成</button></div>`;
  });
  document.getElementById("inventory").innerHTML=html;
}

// 装備管理
function equipItem(i){let item=inventory[i];equipment[item.type]=item;updateStats();}
function updateStats(){attackPower=5;defense=2;if(equipment.weapon)attackPower+=equipment.weapon.attack;if(equipment.armor)defense+=equipment.armor.def;if(equipment.ring)attackPower+=equipment.ring.attack;}

// 強化・合成・売却
function upgradeItem(i){let item=inventory[i];if(item.level>=item.maxLevel){alert("これ以上強化できない");return;}let cost=item.level*50;if(gold<cost)return;gold-=cost;item.level++;item.attack+=2;item.def+=1;drawInventory();update();}
function fuseItem(i){let item=inventory[i];for(let j=0;j<inventory.length;j++){if(i!=j && inventory[j].name==item.name){item.maxLevel+=5;inventory.splice(j,1);log("合成成功!");drawInventory();return;}}log("同じ装備が必要");}
function rarityFuse(i){let item=inventory[i];if(item.level<10){alert("Lv10以上必要");return;}let same=[];for(let j=0;j<inventory.length;j++){if(inventory[j].name==item.name&&inventory[j].rarity==item.rarity&&inventory[j].level>=10)same.push(j);}if(same.length<3){alert("3つ必要");return;}let rIndex=rarityList.indexOf(item.rarity);if(rIndex>=rarityList.length-1){alert("最大レア");return;}let totalAttack=0,totalDef=0,maxLevel=0;for(let k=0;k<3;k++){totalAttack+=inventory[same[k]].attack;totalDef+=inventory[same[k]].def;if(inventory[same[k]].maxLevel>maxLevel)maxLevel=inventory[same[k]].maxLevel;}for(let k=2;k>=0;k--) inventory.splice(same[k],1);let newItem={name:item.name,type:item.type,attack:totalAttack+5,def:totalDef+3,level:1,maxLevel:maxLevel+5,rarity:rarityList[rIndex+1]};inventory.push(newItem);equipment[newItem.type]=newItem;drawInventory(); updateStats();log("✨レア度アップ! 自動装備されました!");}
function sellItem(i){let item=inventory[i];gold+=item.attack*5;inventory.splice(i,1);drawInventory();}

// ショップ
function buyPotion(){if(gold<20)return;gold-=20;playerHP+=30;if(playerHP>playerMax)playerHP=playerMax;}
function useStatusPotion(){if(gold<50){alert("ゴールド不足！");return;} if(playerStatus.length===0){alert("状態異常なし！"); return;} gold-=50; playerStatus=[]; log("💊 状態異常回復ポーションで全異常を回復！"); update();}
function gacha(){if(gold<100)return;gold-=100;dropItem();log("ガチャ!");}

// ソート
function sortAttack(){inventory.sort((a,b)=>b.attack-a.attack);drawInventory();}
function sortRarity(){inventory.sort((a,b)=>rarityOrder[b.rarity]-rarityOrder[a.rarity]);drawInventory();}

// 次の階
function nextFloor(){floor++;spawnEnemy();update();}

// スキル
let skills=[
  {name:"🔥ファイア", cost:20, action:function(){if(playerMP<20)return;playerMP-=20;enemyHP-=attackPower*3;if(enemyHP<0)enemyHP=0;log("🔥 ファイアで "+attackPower*3+" ダメージ!");if(enemyHP==0 && !nextFloorPending){gold+=10+floor;exp+=5;dropItem();nextFloorPending=true;} if(Math.random()<0.1) enemyStatus.push({type:"burn",value:5,turns:3, icon:"🔥"}); update();}},
  {name:"💧アイス", cost:15, action:function(){if(playerMP<15)return;playerMP-=15;enemyHP-=attackPower*1.5;if(enemyHP<0)enemyHP=0;log("💧 アイスで "+Math.floor(attackPower*1.5)+" ダメージ!"); if(Math.random()<0.05) enemyStatus.push({type:"freeze",turns:1, icon:"❄"}); update();}},
  {name:"⚡サンダー", cost:25, action:function(){if(playerMP<25)return;playerMP-=25;enemyHP-=attackPower*2;if(enemyHP<0)enemyHP=0;log("⚡ サンダーで "+Math.floor(attackPower*2)+" ダメージ!"); if(Math.random()<0.1) enemyStatus.push({type:"paralysis",turns:2, icon:"⚡"}); if(enemyHP==0 && !nextFloorPending){gold+=10+floor;exp+=5;dropItem();nextFloorPending=true;} update();}},
  {name:"💖ヒール", cost:15, action:function(){if(playerMP<15)return;playerMP-=15;let heal=30;playerHP+=heal;if(playerHP>playerMax)playerHP=playerMax;log("💖 ヒールで "+heal+" 回復!"); update();}},
  {name:"🛡バリア", cost:20, action:function(){if(playerMP<20)return;playerMP-=20;defense+=5;log("🛡 バリア発動! 次の敵攻撃5ダメージ軽減!"); setTimeout(()=>{defense-=5;},5000); update();}}
];
function drawSkills(){let html=""; skills.forEach((s,i)=>{html += `<button onclick="skills[${i}].action()">${s.name} (${s.cost}MP)</button>`;}); document.getElementById("skillButtons").innerHTML=html;}

// 状態異常処理
function processStatus(target, statusArray){
  for(let i=statusArray.length-1;i>=0;i--){
    let s=statusArray[i];
    switch(s.type){
      case "burn": if(target===playerHP) playerHP-=s.value; else enemyHP-=s.value; log(`${target===playerHP?"プレイヤー":"敵"}が🔥やけどで ${s.value} ダメージ`); s.turns--; break;
      case "freeze": s.turns--; break;
      case "paralysis": s.turns--; break;
      case "poison": if(target===playerHP) playerHP-=s.value; else enemyHP-=s.value; log(`${target===playerHP?"プレイヤー":"敵"}が💀毒で ${s.value} ダメージ`); s.turns--; break;
      case "defDown": s.turns--; break;
    }
    if(s.turns<=0) statusArray.splice(i,1);
  }
}

// ボスAI
function bossAction(){
  if(enemyHP<=0) return;
  if(enemyStatus.some(s=>s.type==="freeze")){log("ボスは❄氷結で動けない！"); return;}
  if(enemyStatus.some(s=>s.type==="paralysis") && Math.random()<0.5){log("ボスは⚡麻痺で動けない！"); return;}
  if(enemyHP <= enemyMax*0.5 && Math.random()<0.5){
    let heal=Math.floor(enemyMax*0.2); enemyHP+=heal; if(enemyHP>enemyMax) enemyHP=enemyMax;
    log(`🐉ボスが回復！ ${heal} HP回復`); return;
  }
  if(Math.random()<0.6){
    let dmg=10+Math.floor(Math.random()*10);
    let defDown=enemyStatus.filter(s=>s.type==="defDown").length*2;
    dmg-=defDown; if(dmg<1)dmg=1;
    playerHP-=dmg; log(`🐉ボスの攻撃！ ${dmg} ダメージ`);
    if(playerHP<=0){alert("ゲームオーバー"); location.reload();}
  } else {
    let shield=Math.floor(enemyMax*0.05); enemyHP+=shield; if(enemyHP>enemyMax) enemyHP=enemyMax;
    log(`🐉ボスが防御！${shield} 回復`);
  }
}

// 敵攻撃
function enemyAttack(){
  processStatus(playerHP, playerStatus);
  processStatus(enemyHP, enemyStatus);
  if(enemyHP<=0) return;
  if(enemy.includes("ボス")) bossAction(); 
  else{
    let dmg=5-defense; if(dmg<1)dmg=1;
    playerHP-=dmg; log(`敵の攻撃 ${dmg} ダメージ`);
    if(playerHP<=0){alert("ゲームオーバー"); location.reload();}
  }
  update();
}

// オート戦闘
function autoBattle(){
  if(nextFloorPending){nextFloorPending=false; nextFloor(); return;}
  if(!autoBattleOn || enemyHP<=0) return;
  if(playerStatus.some(s=>s.type==="freeze")) return;
  processStatus(playerHP, playerStatus);
  processStatus(enemyHP, enemyStatus);
  if(playerHP <= playerMax*0.5 && playerMP>=skills[3].cost){skills[3].action(); return;}
  if(playerMP>=skills[4].cost && defense<=2){skills[4].action(); return;}
  if(playerMP>=skills[prioritySkillIndex].cost){skills[prioritySkillIndex].action(); return;}
  let atkSkills=skills.filter((s,i)=>i!==3 && i!==4 && playerMP>=s.cost);
  if(atkSkills.length>0){atkSkills[Math.floor(Math.random()*atkSkills.length)].action(); return;}
  attack();
}

// 優先スキル選択
document.getElementById("prioritySkillSelect").onchange=function(){prioritySkillIndex=parseInt(this.value); log("⚡ オート優先スキルを "+skills[prioritySkillIndex].name+" に変更");}

// 更新
function update(){
  document.getElementById("floor").innerText=floor;
  document.getElementById("hp").innerText=playerHP+"/"+playerMax;
  document.getElementById("mp").innerText=playerMP+"/"+playerMaxMP;
  document.getElementById("level").innerText=level;
  document.getElementById("exp").innerText=exp+"/"+expMax;
  document.getElementById("gold").innerText=gold;
  document.getElementById("enemyHP").innerText=enemyHP+"/"+enemyMax;
  document.getElementById("hpbar").style.width=(playerHP/playerMax*100)+"%";
  document.getElementById("enemybar").style.width=(enemyHP/enemyMax*100)+"%";
  document.getElementById("playerStatusDisplay").innerText=playerStatus.map(s=>s.icon).join(" ");
}

// セーブ・ロード
function saveGame(){localStorage.setItem("towerSave",JSON.stringify({floor, level, gold, attackPower, playerMax, playerHP, playerMaxMP, playerMP, inventory, equipment, playerStatus})); log("💾 ゲームをセーブしました！");}
function loadGame(){let data=localStorage.getItem("towerSave"); if(!data) return; let d=JSON.parse(data); floor=d.floor||1; level=d.level||1; gold=d.gold||0; attackPower=d.attackPower||5; playerMax=d.playerMax||100; playerHP=d.playerHP!==undefined?d.playerHP:playerMax; playerMaxMP=d.playerMaxMP||50; playerMP=d.playerMP!==undefined?d.playerMP:playerMaxMP; inventory=d.inventory||[]; equipment=d.equipment||{weapon:null,armor:null,ring:null}; playerStatus=d.playerStatus||[];}

// 初期化
loadGame(); spawnEnemy(); drawSkills(); drawInventory(); update();
document.getElementById("attackBtn").onclick=attack;
document.getElementById("autoBtn").onclick=function(){autoBattleOn=!autoBattleOn; this.textContent = autoBattleOn?"🟢オート戦闘ON":"🔴オート戦闘OFF"; log("オート戦闘 " + (autoBattleOn?"ON":"OFF"));}

// 1秒ごとオート戦闘
setInterval(autoBattle,1000);
</script>
</body>
</html>
